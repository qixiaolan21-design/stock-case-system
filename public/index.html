<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票教学案例管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-chart-line text-2xl"></i>
                    <span class="text-xl font-bold">股票教学案例管理系统</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex">
        <aside class="w-64 bg-white shadow-md min-h-screen">
            <nav class="p-4 space-y-2">
                <a href="#" onclick="showSection('dashboard')" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg bg-blue-50 text-blue-600" data-section="dashboard">
                    <i class="fas fa-tachometer-alt w-5"></i><span>仪表盘</span>
                </a>
                <a href="#" onclick="showSection('cases')" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" data-section="cases">
                    <i class="fas fa-file-alt w-5"></i><span>案例记录</span>
                </a>
                <a href="#" onclick="showSection('evidence')" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" data-section="evidence">
                    <i class="fas fa-images w-5"></i><span>印证案例库</span>
                </a>
                <a href="#" onclick="showSection('feedback')" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" data-section="feedback">
                    <i class="fas fa-comments w-5"></i><span>学员反馈</span>
                </a>
                <a href="#" onclick="showSection('search')" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" data-section="search">
                    <i class="fas fa-search w-5"></i><span>搜索</span>
                </a>
                <a href="#" onclick="showSection('chart')" class="nav-item flex items-center space-x-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-50" data-section="chart">
                    <i class="fas fa-chart-area w-5"></i><span>图表展示</span>
                </a>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <!-- 仪表盘 -->
            <div id="dashboard" class="section active">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">教学案例</p>
                                <p class="text-3xl font-bold text-blue-600 mt-1" id="stat-cases">0</p>
                            </div>
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                                <i class="fas fa-file-alt text-blue-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">印证案例</p>
                                <p class="text-3xl font-bold text-purple-600 mt-1" id="stat-evidence">0</p>
                            </div>
                            <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                                <i class="fas fa-images text-purple-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">学员反馈</p>
                                <p class="text-3xl font-bold text-green-600 mt-1" id="stat-feedback">0</p>
                            </div>
                            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                                <i class="fas fa-comments text-green-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">纳指数据</p>
                                <p class="text-3xl font-bold text-orange-600 mt-1" id="stat-nasdaq">0</p>
                            </div>
                            <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                                <i class="fas fa-chart-line text-orange-600 text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold mb-4">快速操作</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <button onclick="showSection('cases')" class="flex items-center p-4 bg-blue-50 rounded-lg hover:bg-blue-100 text-left">
                            <i class="fas fa-file-alt text-blue-600 mr-3 text-xl"></i>
                            <div><p class="font-medium text-blue-900">案例记录</p><p class="text-sm text-blue-600">添加股票案例</p></div>
                        </button>
                        <button onclick="showSection('evidence')" class="flex items-center p-4 bg-purple-50 rounded-lg hover:bg-purple-100 text-left">
                            <i class="fas fa-images text-purple-600 mr-3 text-xl"></i>
                            <div><p class="font-medium text-purple-900">印证案例</p><p class="text-sm text-purple-600">添加印证案例</p></div>
                        </button>
                        <button onclick="showSection('search')" class="flex items-center p-4 bg-green-50 rounded-lg hover:bg-green-100 text-left">
                            <i class="fas fa-search text-green-600 mr-3 text-xl"></i>
                            <div><p class="font-medium text-green-900">搜索</p><p class="text-sm text-green-600">按标签查找</p></div>
                        </button>
                        <button onclick="showSection('chart')" class="flex items-center p-4 bg-orange-50 rounded-lg hover:bg-orange-100 text-left">
                            <i class="fas fa-chart-area text-orange-600 mr-3 text-xl"></i>
                            <div><p class="font-medium text-orange-900">图表</p><p class="text-sm text-orange-600">纳指走势</p></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 案例记录 -->
            <div id="cases" class="section">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">案例记录</h2>
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <h3 class="text-lg font-semibold mb-4">添加案例</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="date" id="case-date" class="border rounded-lg px-3 py-2">
                        <input type="text" id="case-code" placeholder="股票代码" class="border rounded-lg px-3 py-2">
                        <input type="text" id="case-name" placeholder="股票名称" class="border rounded-lg px-3 py-2">
                        <button onclick="addCase()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">添加</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                        <input type="text" id="case-pressure" placeholder="压力位（逗号分隔）" class="border rounded-lg px-3 py-2">
                        <input type="text" id="case-support" placeholder="支撑位（逗号分隔）" class="border rounded-lg px-3 py-2">
                    </div>
                    <textarea id="case-risk" rows="2" placeholder="风险点" class="w-full border rounded-lg px-3 py-2 mt-4"></textarea>
                    <textarea id="case-opportunity" rows="2" placeholder="机会点" class="w-full border rounded-lg px-3 py-2 mt-2"></textarea>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold mb-4">案例列表</h3>
                    <div id="cases-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- 印证案例库 -->
            <div id="evidence" class="section">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">印证案例库</h2>
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <h3 class="text-lg font-semibold mb-4">添加印证案例</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="date" id="evidence-date" class="border rounded-lg px-3 py-2">
                        <input type="text" id="evidence-code" placeholder="股票代码" class="border rounded-lg px-3 py-2">
                        <input type="text" id="evidence-name" placeholder="股票名称" class="border rounded-lg px-3 py-2">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                        <select id="evidence-type" class="border rounded-lg px-3 py-2">
                            <option value="">选择印证类型</option>
                            <option value="筹码">筹码</option>
                            <option value="机构DC">机构DC</option>
                            <option value="密码">密码</option>
                            <option value="趋势">趋势</option>
                            <option value="量能">量能</option>
                            <option value="K线">K线</option>
                            <option value="支撑压力">支撑压力</option>
                            <option value="均线">均线</option>
                        </select>
                        <input type="text" id="evidence-tags" placeholder="标签（逗号分隔）" class="border rounded-lg px-3 py-2">
                    </div>
                    <textarea id="evidence-desc" rows="2" placeholder="案例描述" class="w-full border rounded-lg px-3 py-2 mt-4"></textarea>
                    <button onclick="addEvidence()" class="mt-4 bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700">保存案例</button>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold mb-4">案例列表</h3>
                    <div id="evidence-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- 学员反馈 -->
            <div id="feedback" class="section">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">学员反馈</h2>
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <h3 class="text-lg font-semibold mb-4">添加反馈</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="date" id="feedback-date" class="border rounded-lg px-3 py-2">
                        <input type="text" id="feedback-student" placeholder="学员名称" class="border rounded-lg px-3 py-2">
                        <input type="text" id="feedback-stock" placeholder="股票代码" class="border rounded-lg px-3 py-2">
                        <input type="number" id="feedback-profit" placeholder="获利金额" class="border rounded-lg px-3 py-2">
                    </div>
                    <div class="mt-4">
                        <label class="block text-gray-600 mb-2">方法标签:</label>
                        <div class="flex flex-wrap gap-2">
                            <label class="flex items-center space-x-2 bg-gray-100 px-3 py-2 rounded-lg cursor-pointer">
                                <input type="checkbox" class="method-tag" value="0家K线"><span>0家K线</span>
                            </label>
                            <label class="flex items-center space-x-2 bg-gray-100 px-3 py-2 rounded-lg cursor-pointer">
                                <input type="checkbox" class="method-tag" value="筹码"><span>筹码</span>
                            </label>
                            <label class="flex items-center space-x-2 bg-gray-100 px-3 py-2 rounded-lg cursor-pointer">
                                <input type="checkbox" class="method-tag" value="飘带"><span>飘带</span>
                            </label>
                            <label class="flex items-center space-x-2 bg-gray-100 px-3 py-2 rounded-lg cursor-pointer">
                                <input type="checkbox" class="method-tag" value="机构DC"><span>机构DC</span>
                            </label>
                        </div>
                    </div>
                    <textarea id="feedback-desc" rows="2" placeholder="反馈描述" class="w-full border rounded-lg px-3 py-2 mt-4"></textarea>
                    <button onclick="addFeedback()" class="mt-4 bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">保存反馈</button>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold mb-4">反馈列表</h3>
                    <div id="feedback-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- 搜索 -->
            <div id="search" class="section">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">案例搜索</h2>
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <div class="flex gap-4">
                        <input type="text" id="search-input" placeholder="输入关键词搜索..." class="flex-1 border rounded-lg px-4 py-3">
                        <input type="text" id="search-stock" placeholder="股票代码" class="border rounded-lg px-4 py-3 w-40">
                        <button onclick="performSearch()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">搜索</button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <h3 class="text-lg font-semibold mb-4">热门标签</h3>
                    <div class="flex flex-wrap gap-2">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full cursor-pointer hover:bg-blue-200" onclick="searchByTag('筹码')">筹码</span>
                        <span class="px-3 py-1 bg-purple-100 text-purple-700 rounded-full cursor-pointer hover:bg-purple-200" onclick="searchByTag('机构DC')">机构DC</span>
                        <span class="px-3 py-1 bg-orange-100 text-orange-700 rounded-full cursor-pointer hover:bg-orange-200" onclick="searchByTag('密码')">密码</span>
                        <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full cursor-pointer hover:bg-green-200" onclick="searchByTag('趋势')">趋势</span>
                        <span class="px-3 py-1 bg-pink-100 text-pink-700 rounded-full cursor-pointer hover:bg-pink-200" onclick="searchByTag('量能')">量能</span>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h3 class="text-lg font-semibold mb-4">搜索结果</h3>
                    <div id="search-results" class="space-y-3"></div>
                </div>
            </div>

            <!-- 图表展示 -->
            <div id="chart" class="section">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">图表展示</h2>
                <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
                    <button onclick="loadChart()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-sync-alt mr-2"></i>刷新图表
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div id="chart-container" style="width: 100%; height: 500px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('case-date').value = today;
            document.getElementById('evidence-date').value = today;
            document.getElementById('feedback-date').value = today;
            
            updateStats();
            loadCases();
            loadEvidence();
            loadFeedback();
        });

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('bg-blue-50', 'text-blue-600');
                n.classList.add('text-gray-700');
            });
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('bg-blue-50', 'text-blue-600');
            if (sectionId === 'chart') setTimeout(loadChart, 100);
        }

        async function updateStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('stat-cases').textContent = data.caseCount;
                document.getElementById('stat-evidence').textContent = data.evidenceCount;
                document.getElementById('stat-feedback').textContent = data.feedbackCount;
                document.getElementById('stat-nasdaq').textContent = data.nasdaqCount;
            } catch (e) { console.error('加载统计失败:', e); }
        }

        async function addCase() {
            const data = {
                date: document.getElementById('case-date').value,
                stock_code: document.getElementById('case-code').value,
                stock_name: document.getElementById('case-name').value,
                pressure_points: document.getElementById('case-pressure').value.split(',').map(s => s.trim()).filter(s => s),
                support_points: document.getElementById('case-support').value.split(',').map(s => s.trim()).filter(s => s),
                risk_points: document.getElementById('case-risk').value.split('\n').filter(s => s.trim()),
                opportunity_points: document.getElementById('case-opportunity').value.split('\n').filter(s => s.trim())
            };
            if (!data.stock_code) { alert('请输入股票代码'); return; }
            
            try {
                const res = await fetch('/api/cases', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('添加成功！');
                    document.getElementById('case-code').value = '';
                    document.getElementById('case-name').value = '';
                    document.getElementById('case-pressure').value = '';
                    document.getElementById('case-support').value = '';
                    document.getElementById('case-risk').value = '';
                    document.getElementById('case-opportunity').value = '';
                    loadCases();
                    updateStats();
                }
            } catch (e) { alert('添加失败: ' + e); }
        }

        async function loadCases() {
            try {
                const res = await fetch('/api/cases');
                const data = await res.json();
                const container = document.getElementById('cases-list');
                if (data.cases.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-8">暂无案例</p>';
                    return;
                }
                container.innerHTML = data.cases.slice(0, 20).map(c => `
                    <div class="border rounded-lg p-4 hover:shadow-md transition-all">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="font-semibold">${c.stock_name || c.stock_code}</span>
                                <span class="text-gray-400">(${c.stock_code})</span>
                                <span class="text-gray-400 ml-2">${c.date}</span>
                            </div>
                        </div>
                        <div class="mt-2 text-sm text-gray-600">
                            ${c.pressure_points && c.pressure_points.length ? `<span class="text-red-600">压力: ${c.pressure_points.join(', ')}</span>` : ''}
                            ${c.support_points && c.support_points.length ? `<span class="text-green-600 ml-4">支撑: ${c.support_points.join(', ')}</span>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error('加载案例失败:', e); }
        }

        async function addEvidence() {
            const data = {
                date: document.getElementById('evidence-date').value,
                stock_code: document.getElementById('evidence-code').value,
                stock_name: document.getElementById('evidence-name').value,
                evidence_type: document.getElementById('evidence-type').value,
                evidence_tags: document.getElementById('evidence-tags').value.split(',').map(s => s.trim()).filter(s => s),
                description: document.getElementById('evidence-desc').value
            };
            if (!data.stock_code) { alert('请输入股票代码'); return; }
            
            try {
                const res = await fetch('/api/evidence', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('添加成功！');
                    document.getElementById('evidence-code').value = '';
                    document.getElementById('evidence-name').value = '';
                    document.getElementById('evidence-tags').value = '';
                    document.getElementById('evidence-desc').value = '';
                    loadEvidence();
                    updateStats();
                }
            } catch (e) { alert('添加失败: ' + e); }
        }

        async function loadEvidence() {
            try {
                const res = await fetch('/api/evidence');
                const data = await res.json();
                const container = document.getElementById('evidence-list');
                if (data.evidence.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-8">暂无案例</p>';
                    return;
                }
                const typeColors = {
                    '筹码': 'bg-blue-100 text-blue-700', '机构DC': 'bg-purple-100 text-purple-700',
                    '密码': 'bg-orange-100 text-orange-700', '趋势': 'bg-green-100 text-green-700',
                    '量能': 'bg-pink-100 text-pink-700', 'K线': 'bg-yellow-100 text-yellow-700',
                    '支撑压力': 'bg-indigo-100 text-indigo-700', '均线': 'bg-teal-100 text-teal-700'
                };
                container.innerHTML = data.evidence.slice(0, 20).map(e => `
                    <div class="border rounded-lg p-4 hover:shadow-md transition-all">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="font-semibold">${e.stock_name || e.stock_code}</span>
                                <span class="text-gray-400">(${e.stock_code})</span>
                                <span class="text-gray-400 ml-2">${e.date}</span>
                                ${e.evidence_type ? `<span class="ml-2 px-2 py-1 rounded text-sm ${typeColors[e.evidence_type] || 'bg-gray-100'}">${e.evidence_type}</span>` : ''}
                            </div>
                        </div>
                        ${e.evidence_tags && e.evidence_tags.length ? `
                            <div class="mt-2">${e.evidence_tags.map(t => `<span class="px-2 py-1 bg-gray-100 rounded text-sm mr-1">${t}</span>`).join('')}</div>
                        ` : ''}
                        ${e.description ? `<p class="mt-2 text-gray-600 text-sm">${e.description}</p>` : ''}
                    </div>
                `).join('');
            } catch (e) { console.error('加载印证案例失败:', e); }
        }

        async function addFeedback() {
            const methodTags = Array.from(document.querySelectorAll('.method-tag:checked')).map(cb => cb.value);
            const data = {
                date: document.getElementById('feedback-date').value,
                student_name: document.getElementById('feedback-student').value,
                stock_code: document.getElementById('feedback-stock').value,
                profit_amount: parseFloat(document.getElementById('feedback-profit').value) || null,
                method_tags: methodTags,
                description: document.getElementById('feedback-desc').value
            };
            try {
                const res = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('添加成功！');
                    document.getElementById('feedback-student').value = '';
                    document.getElementById('feedback-stock').value = '';
                    document.getElementById('feedback-profit').value = '';
                    document.getElementById('feedback-desc').value = '';
                    document.querySelectorAll('.method-tag').forEach(cb => cb.checked = false);
                    loadFeedback();
                    updateStats();
                }
            } catch (e) { alert('添加失败: ' + e); }
        }

        async function loadFeedback() {
            try {
                const res = await fetch('/api/feedback');
                const data = await res.json();
                const container = document.getElementById('feedback-list');
                if (data.feedback.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-8">暂无反馈</p>';
                    return;
                }
                container.innerHTML = data.feedback.slice(0, 20).map(f => `
                    <div class="border rounded-lg p-4 hover:shadow-md transition-all">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="font-semibold">${f.student_name || '匿名'}</span>
                                <span class="text-gray-400 ml-2">${f.date}</span>
                                ${f.stock_code ? `<span class="text-gray-500 ml-2">(${f.stock_code})</span>` : ''}
                            </div>
                            ${f.profit_amount ? `<span class="text-green-600 font-bold">+${f.profit_amount.toLocaleString()}</span>` : ''}
                        </div>
                        ${f.method_tags && f.method_tags.length ? `
                            <div class="mt-2">${f.method_tags.map(t => `<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-sm mr-1">${t}</span>`).join('')}</div>
                        ` : ''}
                        ${f.description ? `<p class="mt-2 text-gray-600 text-sm">${f.description}</p>` : ''}
                    </div>
                `).join('');
            } catch (e) { console.error('加载反馈失败:', e); }
        }

        async function performSearch() {
            const query = document.getElementById('search-input').value;
            const stock = document.getElementById('search-stock').value;
            const params = new URLSearchParams();
            if (query) params.append('q', query);
            if (stock) params.append('stock', stock);
            
            try {
                const res = await fetch('/api/search?' + params);
                const data = await res.json();
                const container = document.getElementById('search-results');
                if (data.results.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 text-center py-8">未找到相关案例</p>';
                    return;
                }
                container.innerHTML = data.results.map(r => `
                    <div class="border rounded-lg p-4 hover:shadow-md transition-all">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="font-semibold">${r.stock_name || r.stock_code}</span>
                                <span class="text-gray-400">(${r.stock_code})</span>
                                <span class="text-gray-400 ml-2">${r.date}</span>
                                ${r.evidence_type ? `<span class="ml-2 px-2 py-1 bg-purple-100 text-purple-700 rounded text-sm">${r.evidence_type}</span>` : ''}
                            </div>
                        </div>
                        ${r.evidence_tags && r.evidence_tags.length ? `
                            <div class="mt-2">${r.evidence_tags.map(t => `<span class="px-2 py-1 bg-gray-100 rounded text-sm mr-1">${t}</span>`).join('')}</div>
                        ` : ''}
                        ${r.description ? `<p class="mt-2 text-gray-600 text-sm">${r.description}</p>` : ''}
                    </div>
                `).join('');
            } catch (e) { console.error('搜索失败:', e); }
        }

        function searchByTag(tag) {
            document.getElementById('search-input').value = tag;
            performSearch();
        }

        let chart = null;
        async function loadChart() {
            try {
                const res = await fetch('/api/chart/data');
                const data = await res.json();
                
                if (!chart) chart = echarts.init(document.getElementById('chart-container'));
                
                if (data.nasdaq.length === 0) {
                    document.getElementById('chart-container').innerHTML = '<div class="flex items-center justify-center h-full text-gray-400">暂无数据</div>';
                    return;
                }
                
                const dates = data.nasdaq.map(d => d.date);
                const prices = data.nasdaq.map(d => [d.open, d.close, d.low, d.high]);
                
                const option = {
                    tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                    xAxis: { type: 'category', data: dates, scale: true },
                    yAxis: { scale: true },
                    dataZoom: [
                        { type: 'inside', start: 0, end: 100 },
                        { type: 'slider', top: '90%', start: 0, end: 100 }
                    ],
                    series: [{
                        name: '纳指',
                        type: 'candlestick',
                        data: prices,
                        itemStyle: { color: '#ef232a', color0: '#14b143' }
                    }]
                };
                
                chart.setOption(option);
            } catch (e) { console.error('加载图表失败:', e); }
        }
    </script>
</body>
</html>
